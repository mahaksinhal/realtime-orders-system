services:
  # 1. Node.js Web Service
  - type: web
    name: realtime-orders-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: realtime-orders-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Enter your existing tripgenie-redis Connection String
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: GEMINI_API_KEY
        sync: false # Forward to Render dashboard to set securely
      - key: INSIGHT_INTERVAL_MS
        value: 60000

databases:
  # 3. PostgreSQL Database
  - name: realtime-orders-db
    plan: free
    databaseName: realtime_orders
